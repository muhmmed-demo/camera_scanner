name: 🔨 Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # السماح بتشغيل يدوي من واجهة GitHub
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      - name: ⬇️ استنساخ الكود (Checkout)
        uses: actions/checkout@v4

      - name: 🐍 إعداد بيئة Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 تثبيت متطلبات نظام اللينكس
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            build-essential ccache ffmpeg libsdl2-dev \
            libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev libunwind-dev \
            adb

      - name: 🏗️ تثبيت Buildozer و Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: 💾 تخزين مؤقت (Cache) لتسريع عمليات البناء المستقبلية
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: 🔨 بناء ملف APK
        run: |
          yes | buildozer -v android debug


      - name: 📤 رفع ملف APK كـ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CameraScanner-APK
          path: bin/*.apk
          retention-days: 30
